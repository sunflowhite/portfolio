<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#000;
color:white;
}

.container{
max-width:420px;
margin:auto;
padding-bottom:80px;
}

.topbar{
height:60px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 16px;
border-bottom:1px solid #262626;
position:sticky;
top:0;
background:#000;
z-index:100;
}

.topbar h1{
font-size:20px;
}

.profile{
padding:24px 16px;
}

.profile-top{
display:flex;
gap:24px;
align-items:center;
}

.logo{
width:90px;
height:90px;
border-radius:50%;
background:linear-gradient(
45deg,
#F58529,
#DD2A7B,
#8134AF,
#515BD4
);
display:flex;
justify-content:center;
align-items:center;
font-size:36px;
font-weight:700;
}

.stats{
display:flex;
gap:28px;
}

.stat{
text-align:center;
}

.stat strong{
display:block;
font-size:18px;
}

.bio{
margin-top:16px;
}

.bio h2{
font-size:16px;
}

.bio p{
color:#aaa;
margin-top:4px;
}

.buttons{
display:flex;
gap:8px;
margin-top:16px;
}

.btn{
flex:1;
padding:10px;
border:none;
border-radius:8px;
background:#262626;
color:white;
font-weight:600;
}

.highlights{
display:flex;
overflow-x:auto;
gap:16px;
padding:16px;
border-top:1px solid #262626;
border-bottom:1px solid #262626;
}

.highlight{
min-width:70px;
text-align:center;
}

.highlight-circle{
width:64px;
height:64px;
border-radius:50%;
border:2px solid #444;
margin:auto;
}

.highlight p{
font-size:12px;
margin-top:6px;
}

.tabs{
display:flex;
}

.tab{
flex:1;
text-align:center;
padding:14px;
border-bottom:1px solid #262626;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:2px;
background:#262626;
}

.post{
aspect-ratio:1;
background:#111;
overflow:hidden;
cursor:pointer;
}

.post iframe{
width:100%;
height:100%;
border:none;
pointer-events:none;
}

.modal{
display:none;
position:fixed;
inset:0;
background:#000;
z-index:999;
overflow:auto;
}

.modal-content{
padding:20px;
}

.close{
font-size:32px;
cursor:pointer;
margin-bottom:20px;
}

.video-wrapper{
position:relative;
padding-bottom:56.25%;
height:0;
overflow:hidden;
border-radius:12px;
}

.video-wrapper iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

.title{
margin-top:16px;
font-size:20px;
font-weight:700;
}

.category{
color:#aaa;
margin-top:8px;
}

</style>
</head>
<body>

<div class="container">

<div class="topbar">
<h1>NOVA</h1>
<div>☰</div>
</div>

<div class="profile">

<div class="profile-top">

<div class="logo">N</div>

<div class="stats">

<div class="stat">
<strong>250+</strong>
<span>Videos</span>
</div>

<div class="stat">
<strong>50+</strong>
<span>Clients</span>
</div>

<div class="stat">
<strong>100M+</strong>
<span>Views</span>
</div>

</div>

</div>

<div class="bio">
<h2>Nova</h2>
<p>Video Editor & Content Studio</p>
<p>Podcasts • Entertainment • Ads • Shorts</p>
</div>

<div class="buttons">
<button class="btn">Contact</button>
<button class="btn">WhatsApp</button>
</div>

</div>

<div class="highlights">

<div class="highlight">
<div class="highlight-circle"></div>
<p>Podcasts</p>
</div>

<div class="highlight">
<div class="highlight-circle"></div>
<p>Ads</p>
</div>

<div class="highlight">
<div class="highlight-circle"></div>
<p>Reels</p>
</div>

<div class="highlight">
<div class="highlight-circle"></div>
<p>Shorts</p>
</div>

</div>

<div class="tabs">
<div class="tab">Posts</div>
<div class="tab">Reels</div>
</div>

<div class="grid">

<div class="post" onclick="openVideo('aRLhpHu6KCI','What Is Self-Compassion?','Podcast Editing')"></div>

<div class="post" onclick="openVideo('CdgVcAEEMC4','Do Millennials Know 2000s Songs?!','Entertainment')"></div>

<div class="post" onclick="openVideo('wAxAAnMFlMc','100 Years Of Snacks','Entertainment')"></div>

<div class="post" onclick="openVideo('hCi0mgS7ZEc','Top 3 Testosterone Exercises','Educational')"></div>

<div class="post" onclick="openVideo('bdrkjMIhrDs','Little Five Points','Storytelling')"></div>

<div class="post"></div>

</div>

</div>

<div class="modal" id="modal">

<div class="modal-content">

<div class="close" onclick="closeVideo()">×</div>

<div class="video-wrapper">
<iframe id="videoFrame" allowfullscreen></iframe>
</div>

<div class="title" id="videoTitle"></div>
<div class="category" id="videoCategory"></div>

</div>

</div>

<script>

function openVideo(id,title,category){

document.getElementById('modal').style.display='block';

document.getElementById('videoFrame').src=
'https://www.youtube.com/embed/'+id+'?autoplay=1';

document.getElementById('videoTitle').innerText=title;

document.getElementById('videoCategory').innerText=category;

}

function closeVideo(){

document.getElementById('modal').style.display='none';

document.getElementById('videoFrame').src='';

}

</script>

</body>
</html>
