<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOVA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

:root{
--bg:#000;
--card:#111;
--border:#222;
--text:#fff;
--muted:#9ca3af;
--cyan:#00E5FF;
--violet:#8C52FF;
}

body{
background:var(--bg);
color:var(--text);
}

.container{
max-width:520px;
margin:auto;
padding-bottom:100px;
}

.topbar{
height:60px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
border-bottom:1px solid var(--border);
position:sticky;
top:0;
background:#000;
z-index:100;
backdrop-filter:blur(20px);
}

.brand{
font-size:22px;
font-weight:800;
background:linear-gradient(
90deg,
var(--cyan),
var(--violet)
);
-webkit-background-clip:text;
color:transparent;
}

.profile{
padding:30px 20px;
text-align:center;
}

.logo{
width:220px;
max-width:90%;
display:block;
margin:auto;
filter:
drop-shadow(0 0 20px rgba(0,229,255,.15))
drop-shadow(0 0 30px rgba(140,82,255,.15));
}

.title{
font-size:30px;
font-weight:800;
margin-top:20px;
}

.subtitle{
color:var(--muted);
margin-top:10px;
font-size:15px;
}

.stats{
display:flex;
justify-content:center;
gap:30px;
margin-top:25px;
}

.stat{
text-align:center;
}

.stat strong{
display:block;
font-size:22px;
}

.stat span{
font-size:12px;
color:var(--muted);
}

.buttons{
display:flex;
gap:10px;
margin-top:25px;
}

.btn{
flex:1;
padding:14px;
border-radius:14px;
text-decoration:none;
font-weight:700;
text-align:center;
transition:.3s;
}

.primary{
background:linear-gradient(
90deg,
var(--cyan),
var(--violet)
);
color:white;
}

.secondary{
background:#151515;
border:1px solid #2a2a2a;
color:white;
}

.btn:hover{
transform:translateY(-2px);
}

.highlights{
display:flex;
gap:16px;
overflow-x:auto;
padding:0 20px 25px;
}

.highlights::-webkit-scrollbar{
display:none;
}

.highlight{
min-width:80px;
text-align:center;
}

.highlight-circle{
width:72px;
height:72px;
border-radius:50%;
border:2px solid #333;
background:#111;
margin:auto;
}

.highlight p{
font-size:12px;
margin-top:8px;
}

.section-title{
padding:0 20px;
margin-bottom:15px;
font-size:20px;
font-weight:700;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:2px;
}
  .post{
position:relative;
aspect-ratio:1;
overflow:hidden;
cursor:pointer;
background:#111;
}

.post img{
width:100%;
height:100%;
object-fit:cover;
transition:.3s;
}

.post:hover img{
transform:scale(1.05);
}

.overlay{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:rgba(0,0,0,.25);
opacity:0;
transition:.3s;
}

.post:hover .overlay{
opacity:1;
}

.play{
font-size:30px;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
backdrop-filter:blur(10px);
z-index:999;
padding:20px;
overflow:auto;
}

.modal-content{
max-width:900px;
margin:40px auto;
background:#111;
border:1px solid #222;
border-radius:24px;
padding:20px;
}

.close{
font-size:32px;
cursor:pointer;
margin-bottom:15px;
}

.video-wrapper{
position:relative;
padding-bottom:56.25%;
height:0;
overflow:hidden;
border-radius:16px;
}

.video-wrapper iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:none;
}

.video-title{
margin-top:16px;
font-size:22px;
font-weight:700;
}

@media(max-width:768px){

.logo{
width:180px;
}

.title{
font-size:26px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="topbar">
<div class="brand">NOVA</div>
<div>✦</div>
</div>

<div class="profile">

<img src="nova-logo.png" class="logo" alt="Nova Logo">

<div class="title">
Video Editor
</div>

<div class="subtitle">
Podcasts • Entertainment • YouTube • Shorts
</div>

<div class="stats">

<div class="stat">
<strong>250+</strong>
<span>Videos</span>
</div>

<div class="stat">
<strong>50+</strong>
<span>Clients</span>
</div>

<div class="stat">
<strong>100M+</strong>
<span>Views</span>
</div>

</div>

<div class="buttons">

<a href="mailto:jsutreja@gmail.com" class="btn primary">
Contact
</a>

<a href="https://wa.me/919998544660" target="_blank" class="btn secondary">
WhatsApp
</a>

</div>

</div>

<div class="highlights">

<div class="highlight">
<div class="highlight-circle"></div>
<p>Podcasts</p>
</div>

<div class="highlight">
<div class="highlight-circle"></div>
<p>Shorts</p>
</div>

<div class="highlight">
<div class="highlight-circle"></div>
<p>Ads</p>
</div>

<div class="highlight">
<div class="highlight-circle"></div>
<p>YouTube</p>
</div>

</div>

<h2 class="section-title">
Projects
</h2>

<div class="grid">

<div class="post" onclick="openVideo('aRLhpHu6KCI','What Is Self-Compassion?')">
<img src="https://img.youtube.com/vi/aRLhpHu6KCI/maxresdefault.jpg">
<div class="overlay"><div class="play">▶</div></div>
</div>

<div class="post" onclick="openVideo('CdgVcAEEMC4','Do Millennials Know 2000s Songs?!')">
<img src="https://img.youtube.com/vi/CdgVcAEEMC4/maxresdefault.jpg">
<div class="overlay"><div class="play">▶</div></div>
</div>

<div class="post" onclick="openVideo('wAxAAnMFlMc','100 Years Of Snacks')">
<img src="https://img.youtube.com/vi/wAxAAnMFlMc/maxresdefault.jpg">
<div class="overlay"><div class="play">▶</div></div>
</div>

<div class="post" onclick="openVideo('hCi0mgS7ZEc','Top 3 Testosterone Exercises')">
<img src="https://img.youtube.com/vi/hCi0mgS7ZEc/hqdefault.jpg">
<div class="overlay"><div class="play">▶</div></div>
</div>

<div class="post" onclick="openVideo('bdrkjMIhrDs','Little Five Points')">
<img src="https://img.youtube.com/vi/bdrkjMIhrDs/maxresdefault.jpg">
<div class="overlay"><div class="play">▶</div></div>
</div>

<div class="post"></div>

</div>

<div class="modal" id="modal">

<div class="modal-content">

<div class="close" onclick="closeVideo()">✕</div>

<div class="video-wrapper">
<iframe id="videoFrame" allowfullscreen></iframe>
</div>

<div class="video-title" id="videoTitle"></div>

</div>

</div>

</div>

<script>

function openVideo(id,title){

document.getElementById('modal').style.display='block';

document.getElementById('videoTitle').innerText=title;

document.getElementById('videoFrame').src=
'https://www.youtube.com/embed/' +
id +
'?autoplay=1&rel=0';

document.body.style.overflow='hidden';

}

function closeVideo(){

document.getElementById('modal').style.display='none';

document.getElementById('videoFrame').src='';

document.body.style.overflow='auto';

}

window.onclick=function(event){

const modal=document.getElementById('modal');

if(event.target===modal){

closeVideo();

}

}

</script>

</body>
</html>
