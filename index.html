<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOVA | Video Editor</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

:root{
--bg:#000000;
--card:#111111;
--border:#262626;
--text:#ffffff;
--muted:#a1a1aa;
}

html{
scroll-behavior:smooth;
}

body{
background:var(--bg);
color:var(--text);
}

.container{
max-width:900px;
margin:auto;
padding:40px 20px 80px;
}

.hero{
text-align:center;
margin-bottom:60px;
}

.logo{
width:220px;
height:auto;
display:block;
margin:auto;
filter:drop-shadow(0 0 25px rgba(122,92,255,.25));
}

.stats{
display:flex;
justify-content:center;
gap:40px;
margin-top:30px;
flex-wrap:wrap;
}

.stat{
text-align:center;
}

.stat strong{
display:block;
font-size:32px;
font-weight:800;
}

.stat span{
font-size:14px;
color:var(--muted);
}

.buttons{
display:flex;
justify-content:center;
gap:12px;
margin-top:30px;
flex-wrap:wrap;
}

.btn{
background:#1f1f1f;
border:1px solid #333;
color:white;
padding:14px 24px;
border-radius:12px;
text-decoration:none;
font-weight:600;
transition:.3s;
}

.btn:hover{
transform:translateY(-2px);
background:#2a2a2a;
}

.section-title{
font-size:30px;
font-weight:800;
margin-bottom:25px;
}

.feed{
display:flex;
flex-direction:column;
gap:28px;
}

.card{
cursor:pointer;
}

.thumbnail{
position:relative;
overflow:hidden;
border-radius:22px;
border:1px solid var(--border);
background:var(--card);
}

.thumbnail img{
width:100%;
display:block;
transition:.4s;
}

.card:hover .thumbnail img{
transform:scale(1.04);
}

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,.25);
display:flex;
align-items:center;
justify-content:center;
}

.play{
width:72px;
height:72px;
border-radius:50%;
background:rgba(255,255,255,.18);
backdrop-filter:blur(12px);
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
}

.video-title{
font-size:22px;
font-weight:700;
margin-top:12px;
}

.video-category{
font-size:14px;
color:var(--muted);
margin-top:4px;
}

.modal{
display:none;
position:fixed;
inset:0;
background:#000;
z-index:999;
padding:20px;
overflow:auto;
}

.close{
font-size:40px;
cursor:pointer;
}

.modal-title{
font-size:28px;
font-weight:800;
margin-top:20px;
margin-bottom:20px;
}

.video-wrapper{
position:relative;
padding-bottom:56.25%;
height:0;
overflow:hidden;
border-radius:16px;
}

.video-wrapper iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:none;
}

@media(max-width:768px){

.logo{
width:170px;
}

.stat strong{
font-size:24px;
}

.video-title{
font-size:18px;
}

}

</style>
</head>

<!-- VIDEO MODAL -->

<div class="modal" id="modal">

<div class="close"
onclick="closeVideo()">
×
</div>

<div class="modal-title"
id="videoTitle">
</div>

<div class="video-wrapper">

<iframe
id="videoFrame"
allowfullscreen>
</iframe>

</div>

</div>

<script>

function openVideo(id,title){

document.getElementById('modal').style.display='block';

document.getElementById('videoTitle').innerText=title;

document.getElementById('videoFrame').src=
'https://www.youtube.com/embed/' + id + '?autoplay=1';

}

function closeVideo(){

document.getElementById('modal').style.display='none';

document.getElementById('videoFrame').src='';

}

window.onclick = function(event){

const modal =
document.getElementById('modal');

if(event.target === modal){

closeVideo();

}

}

</script>

</html>
